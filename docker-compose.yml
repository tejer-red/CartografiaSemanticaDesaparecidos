services:
  api-cartografia:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cartografia-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 9090
    ports:
      - "9090:9090"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    external: true
