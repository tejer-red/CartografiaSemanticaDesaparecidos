    <div class="container">
      <h1>Cartografía Interactiva de la Crisis de Desapariciones en Jalisco</h1>
      <p>Este proyecto, basado en el documento de trabajo <strong>"Mapeo de la Crisis Humanitaria de Desapariciones
          Forzadas en Jalisco: Patrones, Tecnología y Acción Colectiva"</strong> por <em>Angel Javier Ramirez
          Abundis</em>, explora las desapariciones forzadas en Jalisco y el papel de la tecnología en abordar esta
        crisis.</p>
      <p>Guadalajara, la capital cultural y económica de Jalisco, enfrenta una de las crisis de derechos humanos más
        severas del país. Entre 2018 y 2024, Jalisco reportó 15,348 personas desaparecidas, promediando 6.7
        desapariciones por día. La crisis se agrava por el subregistro y la manipulación de datos, que ocultan aún más
        su verdadera magnitud.</p>
      <p>En respuesta, este proyecto utiliza ciencias sociales computacionales y análisis estadístico para identificar
        patrones, mapear desapariciones y proporcionar información accionable para activistas, investigadores y
        tomadores de decisiones.</p>
      <img src="https://datades.abundis.com.mx/screen.png" alt="Visualización de Reportes de Desaparecidos en Jalisco">

      <div class="section">
        <h2>Cómo Funciona</h2>
        <p>El mapa interactivo recupera datos de registros públicos y APIs, categorizando las desapariciones por
          factores como fecha, ubicación y atributos demográficos. Esto permite la visualización en tiempo real de la
          crisis mediante:</p>
        <ul>
          <li><strong>Geolocalización por colonias:</strong> Mapeo preciso de cada caso reportado en el Registro
            Nacional de Personas Desaparecidas y No Localizadas (RNPDNO)</li>
          <li><strong>Análisis temporal:</strong> Gráficos que muestran la evolución de las desapariciones desde 2018
            hasta 2024</li>
          <li><strong>Mapas de calor:</strong> Identificación de zonas con mayor concentración de casos</li>
          <li><strong>Correlaciones semánticas:</strong> Análisis de patrones y conexiones entre casos mediante
            procesamiento de lenguaje natural</li>
          <li><strong>Filtros avanzados:</strong> Búsqueda por género, edad, condición, fecha y ubicación</li>
          <li><strong>Sistema de cuadernos:</strong> Herramienta colaborativa para investigadores y activistas</li>
        </ul>
      </div>

      <div class="section">
        <h2>Hallazgos Clave</h2>
        <ul>
          <li><strong>Patrones Temporales:</strong> Las desapariciones tienden a aumentar durante ciertos períodos,
            sugiriendo acciones dirigidas y sistemáticas.</li>
          <li><strong>Clusters Geoespaciales:</strong> Ciertas zonas urbanas, como el Área Metropolitana de Guadalajara,
            muestran altas densidades de desapariciones. Las colonias con mayor número de casos incluyen Chulavista,
            Haciendas de Santa Fe, Villa Fontana en Tlajomulco, y Miramar en Zapopan.</li>
          <li><strong>12 Municipios Prioritarios:</strong> Zapopan (1,035 fichas), Guadalajara (834), Tlajomulco de
            Zúñiga (605), Tlaquepaque (484), Tonalá (275), El Salto (185), Lagos de Moreno, Tala, Encarnación de Díaz,
            Puerto Vallarta, Ixtlahuacán de los Membrillos y Chapala.</li>
          <li><strong>Disparidades Demográficas:</strong> Los datos sugieren un número desproporcionadamente alto de
            desapariciones de hombres, planteando preguntas sobre dinámicas sociales y factores sistémicos.</li>
          <li><strong>Desafíos Forenses:</strong> La falta de coordinación adecuada entre instituciones retrasa la
            identificación de restos y el manejo apropiado de datos.</li>
          <li><strong>Comunidad y Activismo:</strong> Las iniciativas lideradas por ciudadanos han sido cruciales para
            documentar desapariciones y presionar por transparencia gubernamental.</li>
        </ul>
      </div>

      <div class="section">
        <h2>Proyectos Relacionados</h2>
        <p>Esta plataforma se suma a un ecosistema de iniciativas independientes y académicas que buscan visibilizar la
          crisis de desapariciones en Jalisco:</p>
        <ul>
          <li><strong>Cartografía de la Ausencia (ITESO):</strong> Iniciativa independiente y digital que mapea y
            visibiliza a miles de personas desaparecidas, mostrando sus rostros y lugares de desaparición en el Área
            Metropolitana de Guadalajara.</li>
          <li><strong>Proyecto CUCSH-UDG:</strong> "Geolocalizaciones de tramas y urdimbres en las desapariciones de
            personas en Jalisco", encabezado por el Dr. David Coronado del Departamento de Sociología, que busca
            establecer nuevos significados, patrones e intensidades frente a la acción limitada del Estado.</li>
          <li><strong>Mapa de Desaparecidos Jalisco 2025:</strong> Desarrollado por @rys2000dev con datos de Víctor
            Manuel González Romero y Lauro Rodríguez (<a href="https://mapadesaparecidosjal2025.pages.dev/"
              target="_blank" rel="noopener noreferrer nofollow">mapadesaparecidosjal2025.pages.dev</a>).</li>
          <li><strong>Cartografías de la Memoria:</strong> Trabajo elaborado por el periodista e investigador Héctor
            Piña, Rafael Rangel y Fernanda Verduzco, que muestra la cantidad de personas desaparecidas por colonia en la
            zona metropolitana.</li>
        </ul>
      </div>

      <div class="section">
        <h2>Por Qué Importa</h2>
        <p>La crisis humanitaria de desapariciones forzadas en Jalisco va más allá de los números. Detrás de cada caso
          hay una familia buscando respuestas, justicia y cierre. Los enfoques de datos abiertos y métodos
          computacionales proporcionan un camino hacia mayor transparencia y eficiencia en el rastreo y prevención de
          desapariciones.</p>
        <p>Como señaló el Dr. David Coronado: <em>"La idea de nuestra investigación es salir de esa racionalidad
            técnico-burocrática"</em> que reduce a las víctimas a cifras. Este proyecto busca humanizar los datos,
          revelar patrones ocultos y proporcionar herramientas para la acción colectiva.</p>
        <p>El análisis revela que la región Centro es la que más incidencias registra, con una expansión del fenómeno
          hacia otras regiones: Altos Norte, Altos Sur y Ciénega. Los mapas de calor identifican la ausencia de
          desapariciones en colonias con casas con alberca, mientras aumenta en lugares con mayor concurrencia como
          mercados, tianguis y centros comerciales.</p>
      </div>

      <div class="section">
        <h2>Metodología y Datos</h2>
        <p>El proyecto utiliza datos del Registro Nacional de Personas Desaparecidas y No Localizadas (RNPDNO) de la
          Comisión Nacional de Búsqueda. El análisis incluye el filtro de 8,153 fichas de búsqueda, reducidas a 3,332
          registros que conforman la base de análisis de datos geoespaciales.</p>
        <p>La plataforma emplea tecnologías de visualización avanzadas incluyendo MapLibre GL para mapas interactivos,
          Recharts para gráficos temporales, y análisis semántico mediante procesamiento de lenguaje natural para
          identificar correlaciones entre casos.</p>
      </div>
